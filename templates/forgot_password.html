{% extends "base.html" %}
{% block title %}Forgot Password – FindIt{% endblock %}
{% block content %}
<div class="container">
<div class="auth-card">
  <a href="{{ url_for('login') }}" class="back-btn">← Back to Login</a>
  <div class="auth-icon">🔒</div>
  <h1 class="auth-title">Forgot Password?</h1>
  <p class="auth-sub">Enter your email and we'll send an OTP to reset your password.</p>
  <form method="post">
    <div class="fg">
      <label>Email Address <span class="req">*</span></label>
      <input type="email" name="email" class="fc" placeholder="you@gmail.com" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Send Reset OTP →</button>
  </form>
</div>
</div>
{% endblock %}
