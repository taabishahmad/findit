{% extends "base.html" %}
{% block title %}Login – FindIt{% endblock %}
{% block content %}
<div class="container">
<div class="auth-card">
  <a href="{{ url_for('index') }}" class="back-btn">← Back to Board</a>
  <div class="auth-icon">🔑</div>
  <h1 class="auth-title">Welcome Back</h1>
  <p class="auth-sub">Log in to post and manage your items.</p>

  <form method="post" action="{{ url_for('login') }}">
    <div class="fg">
      <label>Email Address <span class="req">*</span></label>
      <input type="email" name="email" class="fc" value="{{ email or '' }}" placeholder="you@gmail.com" required autocomplete="email">
    </div>
    <div class="fg">
      <label>Password <span class="req">*</span></label>
      <input type="password" name="password" class="fc" placeholder="Your password" required autocomplete="current-password">
      <p class="fhint" style="text-align:right;margin-top:.3rem">
        <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
      </p>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Login →</button>
  </form>

  <div class="auth-divider">or</div>
  <p class="auth-switch">New to FindIt? <a href="{{ url_for('register') }}">Create account</a></p>
</div>
</div>
{% endblock %}
