{% extends "base.html" %}
{% block title %}Reset Password – FindIt{% endblock %}
{% block content %}
<div class="container">
<div class="auth-card">
  <a href="{{ url_for('forgot_password') }}" class="back-btn">← Back</a>
  <div class="auth-icon">🔐</div>
  <h1 class="auth-title">Reset Password</h1>
  <p class="auth-sub">Enter the OTP sent to <strong style="color:var(--teal)">{{ email }}</strong></p>
  <form method="post">
    <div class="fg" style="text-align:center">
      <label>Enter OTP</label>
      <div class="otp-row">
        {% for i in range(6) %}<input type="text" class="otp-box" maxlength="1" inputmode="numeric">{% endfor %}
      </div>
      <input type="hidden" id="otp-hidden" name="otp">
    </div>
    <div class="fg">
      <label>New Password <span class="req">*</span></label>
      <input type="password" id="password" name="password" class="fc" placeholder="Min 8 chars, 1 uppercase, 1 number" required minlength="8">
      <div id="pw-bar" class="pw-bar"></div>
      <p id="pw-hint" class="fhint"></p>
    </div>
    <div class="fg">
      <label>Confirm Password <span class="req">*</span></label>
      <input type="password" name="confirm_password" class="fc" placeholder="Repeat password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Reset Password →</button>
  </form>
</div>
</div>
{% endblock %}
